name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libgraphify_napi.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            lib: libgraphify_napi.so
            setup: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: graphify_napi.dll
          - os: macos-latest
            target: aarch64-apple-darwin
            lib: libgraphify_napi.dylib
          - os: macos-latest
            target: x86_64-apple-darwin
            lib: libgraphify_napi.dylib
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Setup cross-compilation toolchain
        if: matrix.setup != ''
        run: ${{ matrix.setup }}
      - name: Configure linker
        if: matrix.linker != ''
        run: |
          mkdir -p .cargo
          echo '[target.${{ matrix.target }}]' >> .cargo/config.toml
          echo 'linker = "${{ matrix.linker }}"' >> .cargo/config.toml
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: cd packages/graphify-cli && npm install
      - name: Build native binary
        env:
          NAPI_RS_CLI_VERSION: '2.18.4'
        run: cargo build --release --target ${{ matrix.target }} -p graphify-napi
      - name: Copy artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.lib }} packages/graphify-cli/dist/graphify.node
      - name: Copy artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.lib }} packages/graphify-cli/dist/graphify.node
      - uses: actions/upload-artifact@v4
        with:
          name: graphify-${{ matrix.target }}
          path: packages/graphify-cli/dist/graphify.node

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'graphify-*'
      - name: Move artifacts
        run: |
          mkdir -p packages/graphify-cli/npm
          for dir in artifacts/graphify-*/; do
            target=$(basename "$dir" | sed 's/graphify-//')
            mkdir -p "packages/graphify-cli/npm/$target"
            cp "$dir"*.node "packages/graphify-cli/npm/$target/graphify.$target.node"
          done
      - name: Install dependencies
        run: cd packages/graphify-cli && npm install
      - name: Build CLI
        run: cd packages/graphify-cli && npm run build
      - name: Prepare packages
        run: cd packages/graphify-cli && npx napi prepublish -t npm --skip-gh-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
      - name: Upgrade npm for OIDC
        run: |
          corepack enable
          corepack prepare npm@11 --activate
      - name: Publish main package
        run: cd packages/graphify-cli && npm publish --provenance --access public
      - name: Publish platform packages
        run: |
          for dir in packages/graphify-cli/npm/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $(jq -r .name < "$dir/package.json")..."
              cd "$dir"
              npm publish --provenance --access public || true
              cd -
            fi
          done
