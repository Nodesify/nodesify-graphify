name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            setup: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Setup cross-compilation toolchain
        if: matrix.setup != ''
        run: ${{ matrix.setup }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: cd packages/graphify-cli && npm install
      - name: Build native binary
        run: |
          cd packages/graphify-cli
          npx napi build --platform --release --target ${{ matrix.target }} --cargo-cwd ../../ -p graphify-napi dist
      - uses: actions/upload-artifact@v4
        with:
          name: graphify-${{ matrix.target }}
          path: packages/graphify-cli/*.node

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'graphify-*'
      - name: Move artifacts
        run: |
          mkdir -p packages/graphify-cli/napi
          find artifacts -name '*.node' -exec mv {} packages/graphify-cli/ \;
      - name: Install dependencies
        run: cd packages/graphify-cli && npm install
      - name: Build CLI
        run: cd packages/graphify-cli && npm run build
      - name: Publish
        run: cd packages/graphify-cli && npx napi prepublish -t npm
