name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
            lib: libgraphify_napi.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: so
            lib: libgraphify_napi.so
            setup: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            ext: so
            lib: libgraphify_napi.so
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: dll
            lib: graphify_napi.dll
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dylib
            lib: libgraphify_napi.dylib
          - os: macos-13
            target: x86_64-apple-darwin
            ext: dylib
            lib: libgraphify_napi.dylib
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Setup cross-compilation toolchain
        if: matrix.setup != ''
        run: ${{ matrix.setup }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: cd packages/graphify-cli && npm install
      - name: Build native binary
        env:
          NAPI_RS_CLI_VERSION: '2.18.4'
        run: cargo build --release --target ${{ matrix.target }} -p graphify-napi
      - name: Copy artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.lib }} packages/graphify-cli/dist/graphify.node
      - name: Copy artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.lib }} packages/graphify-cli/dist/graphify.node
      - uses: actions/upload-artifact@v4
        with:
          name: graphify-${{ matrix.target }}
          path: packages/graphify-cli/dist/graphify.node

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'graphify-*'
      - name: Move artifacts
        run: |
          mkdir -p packages/graphify-cli/napi
          find artifacts -name '*.node' -exec mv {} packages/graphify-cli/ \;
      - name: Install dependencies
        run: cd packages/graphify-cli && npm install
      - name: Build CLI
        run: cd packages/graphify-cli && npm run build
      - name: Publish
        run: cd packages/graphify-cli && npx napi prepublish -t npm
