name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests
        run: cargo test --workspace
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  cli-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies
        run: cd packages/graphify-cli && npm install
      - name: Build native module
        env:
          NAPI_RS_CLI_VERSION: '2.18.4'
        run: cargo build --release -p graphify-napi
      - name: Copy native module
        shell: bash
        run: |
          mkdir -p packages/graphify-cli/dist
          for lib in target/release/libgraphify_napi.so target/release/libgraphify_napi.dylib target/release/graphify_napi.dll; do
            if [ -f "$lib" ]; then
              cp "$lib" packages/graphify-cli/dist/graphify.node
              break
            fi
          done
      - name: Build CLI
        run: cd packages/graphify-cli && npm run build
      - name: Run CLI tests
        run: cd packages/graphify-cli && npm test
